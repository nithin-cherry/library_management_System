<hmtl>
    <head>
        <link href="add.css" rel="stylesheet">
            <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    </head>
    <body>
        <div class="container">
            <h1 class="title">Add a Book</h1>   
            <form id="addBookForm">
                <div class="input"  style="display: flex; ">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required>
                </div>
                 <div class="input " style="display: flex; ">
                <label for="author">Author    </label>
                <input type="text" id="author" name="author" required>
</div>
                 <div class="input" style="display: flex; ">
                <label for="url">Image address</label>
                <input type="text" id="url" name="url" required>
</div>
                 <div class="input" style="display: flex; ">
                <label for="isbn">ISBN</label>
                <input type="number" id="isbn" name="isbn" required>
</div>
                   <div class="input" style="display: flex; ">
                <label for="number">No.of Copies</label>
                <input type="number" id="number" name="number" required>
</div>
           <div class="input" style="display: flex; ">
                <label for="date">Added Date</label>
                <input type="date" id="date" name="date" required>
</div>
                 
                <button type="submit">Submit Request</button>
            </form>
        </div>

    </body>
</hmtl>
